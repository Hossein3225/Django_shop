{% extends "base.html" %}
{% load i18n %}

{% block content %}
<main id="content" role="main">
  <!-- Form -->
  <div class="container content-space-3 content-space-t-lg-4 content-space-b-lg-3">
    <div class="flex-grow-1 mx-auto" style="max-width: 28rem;">
      <!-- Heading -->
      <div class="text-center mb-5 mb-md-7">
        <h1 class="h2">فرم ثبت نام</h1>
        <p>برای ثبت نام کافیست فرم زیر را پر نمایید</p>
      </div>
      <!-- End Heading -->

      <!-- Form -->
      <form method="post" action="{% url 'account_signup' %}">
        {% csrf_token %}
        
        <!-- Email -->
        <div class="mb-3">
          <label class="form-label" for="id_email">ایمیل شما</label>
          <input type="email" name="email" id="id_email" 
                 class="form-control form-control-lg text-center" 
                 placeholder="email@site.com" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label" for="id_password1">رمز عبور</label>
          <input type="password" name="password1" id="id_password1" 
                 class="form-control form-control-lg text-center" 
                 placeholder="8+ characters required" required>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label class="form-label" for="id_password2">رمز عبور را تایید کنید</label>
          <input type="password" name="password2" id="id_password2" 
                 class="form-control form-control-lg text-center" 
                 placeholder="8+ characters required" required>
        </div>

        <!-- Submit -->
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary btn-lg">ثبت نام</button>
        </div>

        <!-- Login Link -->
        <div class="text-center">
          <p>از قبل حساب کاربری دارید؟ <a class="link" href="{% url 'account_login' %}">از اینجا وارد شوید</a></p>
        </div>
      </form>
      <!-- End Form -->
    </div>
  </div>
  <!-- End Form -->
</main>

{% endblock content %}
